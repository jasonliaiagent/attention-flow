name: live-refresh

on:
  schedule:
    - cron: "20 6 * * *"   # daily, after Wikimedia finalizes yesterday's counts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (CPU torch)
        run: |
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

      - name: Export live attention data
        run: python scripts/export_live.py

      - name: Commit refreshed data.json
        run: |
          git config user.name "attention-flow-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json docs/track.json
          git diff --cached --quiet || (git commit -m "live: refresh attention data + track record" && git push)
